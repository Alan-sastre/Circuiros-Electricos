<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circuito Electricos</title>
    <link rel="icon" href="./assets/logorobcodesolutions.ico">
    <style>
        :root {
            --app-height: 100dvh;
        }

        html {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            background-image: url('roblogo.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: var(--app-height);
            min-height: 100dvh;
            overflow: hidden;
            overscroll-behavior: none;
            font-family: Arial, sans-serif;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-drag: none;
            -khtml-user-drag: none;
            -moz-user-drag: none;
            -o-user-drag: none;
            user-drag: none;
        }

        #game-container {
            width: 100vw;
            height: var(--app-height);
            max-height: 100dvh;
        }

        #turn {
            margin: 0;
            width: 100%;
            height: var(--app-height);
            position: fixed;
            top: 0;
            left: 0;
            background-color: #001532;
            background-image: url('roblogo.png');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: contain;
            display: none;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            color: #fff;
            z-index: 1000;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        canvas {
            display: block;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
            outline: 0;
            border: 0;
        }

        * {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.js"></script>
</head>

<body>
    <div id="game-container"></div>
    <div id="turn">
        <p>Por favor, gira tu dispositivo a modo horizontal para jugar.</p>
    </div>
    <script type="module" src="game.js"></script>
    <script>
        function checkOrientation() {
            document.documentElement.style.setProperty("--app-height", `${window.innerHeight}px`);
            const isPortrait = window.matchMedia("(orientation: portrait)").matches;
            const isMobile = window.innerWidth < 768;
            document.getElementById("turn").style.display = isPortrait && isMobile ? "flex" : "none";
        }

        window.addEventListener("resize", checkOrientation);
        window.addEventListener("orientationchange", checkOrientation);
        window.addEventListener("DOMContentLoaded", checkOrientation);
    </script>
</body>

</html>
